name: Deploy Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy app to staging
    runs-on: self-hosted
    environment: Staging

    env:
      ANSIBLE_HOST_KEY_CHECKING: "true"
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare SSH and vault files
        id: secrets
        shell: bash
        run: |
          set -euo pipefail

          secret_dir="$RUNNER_TEMP/drum-dungeon-secrets"
          mkdir -p "$secret_dir"
          chmod 700 "$secret_dir"

          ssh_key_file="$secret_dir/deploy_key"
          vault_file="$secret_dir/vault_pass"
          known_hosts_file="$secret_dir/known_hosts"

          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > "$ssh_key_file"
          printf '%s\n' "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > "$vault_file"
          chmod 600 "$ssh_key_file" "$vault_file"

          ssh-keyscan -H "$SSH_HOST" > "$known_hosts_file"
          chmod 600 "$known_hosts_file"

          {
            echo "SSH_KEY_FILE=$ssh_key_file"
            echo "VAULT_PASSWORD_FILE=$vault_file"
            echo "ANSIBLE_SSH_ARGS=-o UserKnownHostsFile=$known_hosts_file"
          } >> "$GITHUB_ENV"

      - name: Install Ansible collections
        working-directory: ansible
        run: ansible-galaxy collection install -r requirements.yml

      - name: Create temporary staging vars
        shell: bash
        env:
          STAGING_DB_HOST: ${{ secrets.DB_HOST }}
          STAGING_DB_PORT: ${{ secrets.DB_PORT }}
          STAGING_DB_NAME: ${{ secrets.DB_NAME }}
          STAGING_DB_USER: ${{ secrets.DB_USER }}
          STAGING_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          STAGING_SESSION_SECRET_KEY: ${{ secrets.SESSION_SECRET_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ansible/group_vars/staging

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          required = {
              "STAGING_DB_HOST": "DB_HOST",
              "STAGING_DB_PORT": "DB_PORT",
              "STAGING_DB_NAME": "DB_NAME",
              "STAGING_DB_USER": "DB_USER",
              "STAGING_DB_PASSWORD": "DB_PASSWORD",
              "STAGING_SESSION_SECRET_KEY": "SESSION_SECRET_KEY",
          }
          missing = [secret_name for env_name, secret_name in required.items() if not os.environ.get(env_name)]
          if missing:
              raise SystemExit("Missing required Staging environment secrets: " + ", ".join(missing))

          db_port = os.environ["STAGING_DB_PORT"].strip()
          if not db_port.isdigit():
              raise SystemExit("Staging DB_PORT must be numeric")

          vault_vars = Path("ansible/group_vars/staging/vault.yml")
          vault_vars.write_text(
              "# Generated by GitHub Actions; do not commit.\n"
              f"db_host: {json.dumps(os.environ['STAGING_DB_HOST'])}\n"
              f"db_port: {db_port}\n"
              f"db_name: {json.dumps(os.environ['STAGING_DB_NAME'])}\n"
              f"db_user: {json.dumps(os.environ['STAGING_DB_USER'])}\n"
              f"db_password: {json.dumps(os.environ['STAGING_DB_PASSWORD'])}\n"
              f"session_secret_key: {json.dumps(os.environ['STAGING_SESSION_SECRET_KEY'])}\n"
          )
          vault_vars.chmod(0o600)
          PY

      - name: Deploy app to staging
        working-directory: ansible
        run: |
          ansible-playbook -i inventory/phase1.yml playbooks/phase1.yml \
            --user "$SSH_USER" \
            --private-key "$SSH_KEY_FILE" \
            --vault-password-file "$VAULT_PASSWORD_FILE" \
            --tags app \
            --limit app-staging

      - name: Check staging health
        working-directory: ansible
        run: |
          ansible -i inventory/phase1.yml app-staging \
            --user "$SSH_USER" \
            --private-key "$SSH_KEY_FILE" \
            --vault-password-file "$VAULT_PASSWORD_FILE" \
            -b \
            -m uri \
            -a "url=http://127.0.0.1:8000/health return_content=yes status_code=200"

      - name: Clean up temporary secret files
        if: always()
        run: |
          rm -rf "$RUNNER_TEMP/drum-dungeon-secrets"
          rm -f ansible/group_vars/staging/vault.yml
