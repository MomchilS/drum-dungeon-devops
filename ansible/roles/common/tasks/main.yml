---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade apt packages
  ansible.builtin.apt:
    upgrade: dist

- name: Set system timezone
  community.general.timezone:
    name: "{{ system_timezone | default('UTC') }}"

- name: Install common packages
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-venv
      - libpq-dev
      - git
      - rsync
    state: present
