---
# UFW: allow SSH and app port; default deny

- name: Allow SSH
  community.general.ufw:
    rule: allow
    name: OpenSSH
  when: ansible_facts.services['ufw.service'] is defined

- name: Allow app port
  community.general.ufw:
    rule: allow
    port: "{{ app_port | default(8000) }}"
    proto: tcp

- name: Set UFW default policies
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: ansible_facts.services['ufw.service'] is defined
