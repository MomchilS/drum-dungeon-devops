---
- name: Phase 1 baseline
  hosts: all_phase1
  become: true
  vars_files:
    - ../group_vars/all.yml
  vars:
    system_timezone: "{{ timezone | default('UTC') }}"
  roles:
    - role: common
      tags: ["common"]

- name: Configure PostgreSQL on db (production defaults)
  hosts: db
  become: true
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/production.yml
    - ../group_vars/production/vault.yml
  roles:
    - role: database
      tags: ["db"]

- name: Migrate students JSON into PostgreSQL (production defaults)
  hosts: db
  become: true
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/production.yml
    - ../group_vars/production/vault.yml
  roles:
    - role: migration
      tags: ["migrate"]

- name: Deploy app service to staging
  hosts: app-staging
  become: true
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/staging.yml
    - ../group_vars/staging/vault.yml
  roles:
    - role: app
      tags: ["app", "staging"]

- name: Deploy app service to production
  hosts: app-prod
  become: true
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/production.yml
    - ../group_vars/production/vault.yml
  roles:
    - role: app
      tags: ["app", "production"]
